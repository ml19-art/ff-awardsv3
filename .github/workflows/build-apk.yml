name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: FFAwards-Android-v2/FFAwards-Android

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install Android SDK
      run: |
        mkdir -p $HOME/android-sdk/cmdline-tools
        curl -o /tmp/tools.zip "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip"
        unzip -q /tmp/tools.zip -d /tmp/ct
        mv /tmp/ct/cmdline-tools $HOME/android-sdk/cmdline-tools/latest
        yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
        $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0"
        echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV

    - name: Create local.properties
      run: echo "sdk.dir=$HOME/android-sdk" > local.properties

    - name: Setup Gradle wrapper
      run: |
        gradle wrapper --gradle-version=8.6
        chmod +x gradlew

    - name: Build APK
      run: ./gradlew assembleDebug --no-daemon
      env:
        ANDROID_HOME: ${{ env.ANDROID_HOME }}

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: FFAwards-APK
        path: FFAwards-Android-v2/FFAwards-Android/app/build/outputs/apk/debug/app-debug.apk
